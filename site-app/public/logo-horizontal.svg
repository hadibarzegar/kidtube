    <path d="M-6 -10 L-6 10 L9 0 Z" fill="white" opacity="0.93"/>
    <ellipse cx="-7" cy="-8" rx="5" ry="3.5" fill="white" opacity="0.15" transform="rotate(-15 -7 -8)"/>
  </g>

  <!-- KidTube text -->
