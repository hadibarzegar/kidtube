services:
  mongo:
    ports:
      - "27017:27017"

  site-api:
    volumes:
      - ./backend:/app
    environment:
      AIR_ENABLED: "true"

  admin-api:
    volumes:
      - ./backend:/app
    environment:
      AIR_ENABLED: "true"

  site-app:
    volumes:
      - ./site-app:/app
      - /app/node_modules

  admin-app:
    volumes:
      - ./admin-app:/app
      - /app/node_modules
