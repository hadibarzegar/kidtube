worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Upstream definitions
    upstream site_api {
        server site-api:8081;
    }
    upstream admin_api {
        server admin-api:8082;
    }
    upstream site_app {
        server site-app:3000;
    }
    upstream admin_app {
        server admin-app:3001;
    }

    server {
        listen 80;
        server_name _;

        # Health check for nginx itself
        location = /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # HLS static file serving
        location /hls/ {
            alias /var/www/hls/;

            # MIME types for HLS
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }

            # CORS headers for cross-origin playback
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers 'Range, Origin, Accept';
            add_header Access-Control-Expose-Headers 'Content-Length, Content-Range';

            # Cache headers (Phase 5 will tune further)
            add_header Cache-Control "public, max-age=3600";
        }

        # Site API -- strip /api/site prefix
        location /api/site/ {
            proxy_pass http://site_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API -- strip /api/admin prefix
        location /api/admin/ {
            proxy_pass http://admin_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin app
        location /admin/ {
            proxy_pass http://admin_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Site app (catch-all, must be last)
        location / {
            proxy_pass http://site_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
