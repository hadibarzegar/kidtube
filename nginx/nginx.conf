worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Per-extension cache control for HLS files.
    # Map approach keeps all add_header directives in one location block — no nested
    # locations, no add_header inheritance loss, no silent CORS header drops.
    # .ts segments are content-addressed (immutable after creation) so 1-year cache is safe.
    # .m3u8 playlists must always revalidate so the client gets the current segment list.
    map $uri $hls_cache_control {
        ~\.ts$    "public, max-age=31536000, immutable";
        ~\.m3u8$  "no-cache";
        default   "public, max-age=3600";
    }

    # Upstream definitions
    upstream site_api {
        server site-api:8081;
    }
    upstream admin_api {
        server admin-api:8082;
    }
    upstream site_app {
        server site-app:3000;
    }
    upstream admin_app {
        server admin-app:3001;
    }

    server {
        listen 80;
        server_name _;

        # Health check for nginx itself
        location = /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # HLS static file serving
        location /hls/ {
            alias /var/www/hls/;

            # MIME types for HLS
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }

            # CORS headers for cross-origin playback.
            # 'always' ensures headers are sent on ALL response codes (2xx, 3xx, 4xx) —
            # critical for CORS on 206 Partial Content used by Video.js range-based HLS requests.
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range, Origin, Accept' always;
            add_header Access-Control-Expose-Headers 'Content-Length, Content-Range' always;

            # Per-extension cache control via map directive (defined in http block above).
            # .ts -> immutable (1 year), .m3u8 -> no-cache, other -> 1 hour.
            add_header Cache-Control $hls_cache_control always;
        }

        # Site API -- strip /api/site prefix
        location /api/site/ {
            proxy_pass http://site_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API upload — large body size for video file uploads (up to 2GB)
        location = /api/admin/episodes/upload {
            client_max_body_size 2100m;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_request_buffering off;

            proxy_pass http://admin_api/episodes/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API -- strip /api/admin prefix
        location /api/admin/ {
            proxy_pass http://admin_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin app — keep /admin prefix (Next.js basePath expects it)
        location /admin {
            proxy_pass http://admin_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Site app (catch-all, must be last)
        location / {
            proxy_pass http://site_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
